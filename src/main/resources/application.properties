# Server Port & Reverse Proxy Config
server.port=8081
server.forward-headers-strategy=framework
server.tomcat.threads.max=1000

# Database Configuration (PostgreSQL Database)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:gemini_health_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.defaultAutoCommit=false
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD:postgres}}

# JPA / Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console Configuration (Disabled for PostgreSQL)
spring.h2.console.enabled=false

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Strava Credentials (set via environment variables for security)
# DO NOT hardcode credentials here
# Set environment variables: STRAVA_CLIENT_ID and STRAVA_CLIENT_SECRET
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}

# Administrator Strava ID (Set via environment variable for deployment)
admin.strava-id=${ADMIN_STRAVA_ID:}

# Security Configuration
security.require-ssl=${REQUIRE_SSL:false}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}
server.servlet.session.timeout=30m