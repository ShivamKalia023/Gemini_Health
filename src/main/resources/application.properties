# Server Port
server.port=8081

# Database Configuration (H2 File-based Database)
#spring.datasource.url=jdbc:h2:file:./data/db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Strava Credentials (set via environment variables for security)
# DO NOT hardcode credentials here
# Set environment variables: STRAVA_CLIENT_ID and STRAVA_CLIENT_SECRET
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
