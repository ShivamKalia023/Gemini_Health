<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fitness Group Tracker - Home</title>
    <link rel="stylesheet" href="css/style.css?v=1.0.10">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/navbar.js"></script>
    <script src="/js/csrf.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <header class="top-nav"></header>

    <div class="app-container" style="justify-content: center; padding-top: 40px; display: flex;">
        <main class="dashboard-main" style="width: 100%; max-width: 1200px;">
            <!-- Champion Banner -->
            <div class="champion-banner hidden" id="champion-banner" style="margin-bottom: 40px;">
                <div class="champion-content">
                    <div class="champion-avatar-container">
                        <img id="champion-avatar" src="" alt="Champion">
                        <div class="medal-badge">🏆</div>
                    </div>
                    <div class="champion-info">
                        <span class="champion-label">■ CHAMPION · ALL TIME</span>
                        <h2 id="champion-name">--</h2>
                        <div class="champion-stats">
                            <div class="stat">
                                <span class="label">DISTANCE</span>
                                <span class="value" id="champion-dist">-- <span class="unit">km</span></span>
                            </div>
                            <div class="stat">
                                <span class="label">ACTIVITIES</span>
                                <span class="value" id="champion-acts">--</span>
                            </div>
                            <div class="stat">
                                <span class="label">STREAK</span>
                                <span class="value">0 <span class="unit">days</span></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="champion-rank">1</div>
            </div>

            <!-- Two Column Layout -->
            <div class="dashboard-columns">
                <!-- Left Column: Leaderboard -->
                <section class="leaderboard-section" id="leaderboard-section">
                    <div class="section-header">
                        <div>
                            <h3>Leaderboard</h3>
                            <span class="section-subtitle">TOP PERFORMERS · ALL TIME</span>
                        </div>
                        <a href="leaderboard.html" class="view-all">VIEW ALL &rarr;</a>
                    </div>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>RANK</th>
                                <th>ATHLETE</th>
                                <th style="text-align: right;">ACTIVITIES</th>
                                <th style="text-align: right;">LAST RUN DISTANCE</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-list">
                            <tr><td colspan="4" class="loading-text">Loading leaderboard...</td></tr>
                        </tbody>
                    </table>
                </section>

                <!-- Right Column: Activity Feed -->
                <section class="feed-section" id="feed-section">
                    <div class="section-header">
                        <div>
                            <h3>Activity Feed</h3>
                            <span class="section-subtitle">LIVE UPDATES</span>
                        </div>
                        <a href="dashboard.html" class="view-all">VIEW ALL &rarr;</a>
                    </div>
                    <div class="feed-filters-bar">
                        <select id="home-feed-type" class="feed-select" title="Activity Type">
                            <option value="all">All Activities</option>
                            <option value="run">Run</option>
                            <option value="walk">Walk</option>
                            <option value="hike">Hike</option>
                            <option value="ride">Ride</option>
                            <option value="swim">Swim</option>
                            <option value="workout">Workout</option>
                            <option value="row">Row</option>
                            <option value="virtual run">Virtual Run</option>
                            <option value="virtual ride">Virtual Ride</option>
                            <option value="other">Other</option>
                        </select>
                        <select id="home-feed-sort" class="feed-select" title="Sort By">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="longest-dist">Longest Distance</option>
                            <option value="shortest-dist">Shortest Distance</option>
                            <option value="longest-dur">Longest Duration</option>
                            <option value="shortest-dur">Shortest Duration</option>
                        </select>
                    </div>
                    <div id="home-active-filters" class="active-filters-display hidden"></div>
                    <div id="global-feed-list" class="global-feed-list">
                        <div class="loading-text">Loading feed...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    
    <script src="js/charts.js?v=1.0.1"></script>
    <script src="js/app.js?v=1.0.9"></script>
</body>
</html>
