<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fitness Group Tracker - Leaderboard</title>
    <link rel="stylesheet" href="css/style.css?v=1.0.10">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="brand">
            <a href="home.html" style="text-decoration: none; color: inherit;">
                <h2>GFG Tracker</h2>
                <span class="subtitle">Gemini Fitness Group</span>
            </a>
        </div>
        <nav class="main-nav">
            <a href="home.html" class="nav-link">Home</a>
            <a href="leaderboard.html" class="nav-link active">Leaderboards</a>
            <a href="challenges.html" class="nav-link">Challenges</a>
            <a href="dashboard.html" class="nav-link">Feed</a>
        </nav>
        <div class="nav-right-container" style="display: flex; align-items: center; gap: 16px;">
            <div id="last-updated-ticker" style="font-size: 12px; color: #94a3b8; font-weight: 500;" class="last-updated-text hidden-mobile"></div>
            <div class="nav-actions">
        </div>
        </div>
    </header>

    <div class="app-container" style="justify-content: center; padding-top: 40px; display: flex;">
        <main class="dashboard-main" style="width: 100%; max-width: 1200px;">
            <!-- Champion Banner -->
            <div class="champion-banner hidden" id="champion-banner" style="margin-bottom: 40px;">
                <div class="champion-content">
                    <div class="champion-avatar-container">
                        <img id="champion-avatar" src="" alt="Champion">
                        <div class="medal-badge">🏆</div>
                    </div>
                    <div class="champion-info">
                        <span class="champion-label">■ CHAMPION · ALL TIME</span>
                        <h2 id="champion-name">--</h2>
                        <div class="champion-stats">
                            <div class="stat">
                                <span class="label">DISTANCE</span>
                                <span class="value" id="champion-dist">-- <span class="unit">km</span></span>
                            </div>
                            <div class="stat">
                                <span class="label">ACTIVITIES</span>
                                <span class="value" id="champion-acts">--</span>
                            </div>
                            <div class="stat">
                                <span class="label">STREAK</span>
                                <span class="value">0 <span class="unit">days</span></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="champion-rank">1</div>
            </div>

            <!-- Leaderboard -->
            <section class="leaderboard-section" id="leaderboard-section" style="width: 100%; height: auto;">
                <div class="section-header">
                    <div>
                        <h3>Global Leaderboard</h3>
                        <span class="section-subtitle">TOP PERFORMERS · ALL TIME</span>
                    </div>
                </div>
                <div class="leaderboard-table-container">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>RANK</th>
                                <th>ATHLETE</th>
                                <th style="text-align: right;">ACTIVITIES</th>
                                <th style="text-align: right;">LAST RUN DISTANCE</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-list">
                            <tr><td colspan="4" class="loading-text">Loading leaderboard...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    
    <script src="js/charts.js?v=1.0.1"></script>
    <script src="js/app.js?v=1.0.9"></script>
</body>
</html>
