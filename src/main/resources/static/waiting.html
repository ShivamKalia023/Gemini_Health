<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFG Tracker - Awaiting Approval</title>
    <link rel="stylesheet" href="css/style.css?v=1.0.10">
    <style>
        body.welcome-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            font-family: var(--font-family);
            color: #f8fafc;
            overflow: hidden;
        }

        .waiting-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: #4ade80;
            margin: 0 auto 24px auto;
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .waiting-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .waiting-text {
            font-size: 15px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            background: #e95420;
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #f97316;
            transform: translateY(-1px);
        }

        .btn-secondary {
            width: 100%;
            background: transparent;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="/js/csrf.js"></script>
</head>
<body class="welcome-bg">
    <div class="waiting-card">
        <div class="success-icon">✓</div>
        
        <h1 class="waiting-title">Request Submitted</h1>
        
        <p class="waiting-text">
            Your request to join GFG Tracker has been submitted successfully.<br><br>
            An administrator must approve your account before you can access the application.<br><br>
            You will be able to log in once your request has been approved.
        </p>

        <div class="btn-container">
            <button class="btn-primary" id="refresh-btn">Refresh Status</button>
            <button class="btn-secondary" id="logout-btn">Log Out</button>
        </div>
    </div>
    <script src="/js/waiting.js"></script>
</body>
</html>
