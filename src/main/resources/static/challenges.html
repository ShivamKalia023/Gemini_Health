<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fitness Group Tracker - Challenges</title>
    <link rel="stylesheet" href="css/style.css?v=1.0.11">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/navbar.js"></script>
    <script src="/js/csrf.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <header class="top-nav"></header>

    <div class="app-container" style="justify-content: center; padding-top: 40px; display: flex;">
        <main class="dashboard-main" style="width: 100%; max-width: 1200px;">
            <section class="challenges-section" id="challenges-section" style="width: 100%; height: auto;">
                <div class="section-header">
                    <div>
                        <h3>Challenges</h3>
                        <span class="section-subtitle">COMPETE WITH FRIENDS</span>
                    </div>
                </div>
                <div class="tabs-container" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                    <button class="tab-btn active" data-tab="upcoming" style="background: transparent; border: none; color: #e95420; font-size: 16px; font-weight: 600; cursor: pointer; padding: 5px 10px; border-bottom: 2px solid #e95420;">Upcoming Challenges</button>
                    <button class="tab-btn" data-tab="active" style="background: transparent; border: none; color: #94a3b8; font-size: 16px; font-weight: 600; cursor: pointer; padding: 5px 10px;">Active Challenges</button>
                </div>
                <div id="challenges-list" style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="loading-text">Loading challenges...</div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Challenge Leaderboard Modal -->
    <div id="challenge-modal-overlay" class="dashboard-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;">
        <div class="dashboard-modal" style="background: #1e293b; border-radius: 12px; padding: 24px; max-width: 800px; width: 95%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px;">
                <h3 id="modal-challenge-title" style="margin: 0; color: #f8fafc; font-size: 24px;">Challenge Title</h3>
                <button id="close-challenge-modal" class="close-btn" style="background: transparent; border: none; color: #94a3b8; font-size: 28px; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-challenge-desc" style="color: #94a3b8; margin-bottom: 20px; line-height: 1.5;"></p>
                <div class="profile-stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px;">
                    <div class="profile-stat-card" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                        <div class="stat-header" style="color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 5px;"><span>GOAL</span></div>
                        <div class="stat-value" id="modal-challenge-goal" style="color: #f8fafc; font-size: 20px; font-weight: 700;">--</div>
                    </div>
                    <div class="profile-stat-card" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                        <div class="stat-header" style="color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 5px;"><span>DURATION</span></div>
                        <div class="stat-value" id="modal-challenge-duration" style="color: #f8fafc; font-size: 14px; font-weight: 600;">--</div>
                    </div>
                    <div class="profile-stat-card" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
                        <div class="stat-header" style="color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 5px;"><span>PARTICIPANTS</span></div>
                        <div class="stat-value" id="modal-challenge-participants" style="color: #f8fafc; font-size: 20px; font-weight: 700;">--</div>
                    </div>
                </div>
                <h4 style="color: #f8fafc; margin-bottom: 15px; font-size: 18px;">Leaderboard</h4>
                <div class="table-container" style="background: #0f172a; border-radius: 8px; border: 1px solid #334155; overflow: hidden;">
                    <table class="leaderboard-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: #1e293b; border-bottom: 1px solid #334155;">
                            <tr>
                                <th style="padding: 12px 16px; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase;">Rank</th>
                                <th style="padding: 12px 16px; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase;">Athlete</th>
                                <th style="padding: 12px 16px; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase;">Progress</th>
                                <th style="padding: 12px 16px; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase;">Status</th>
                            </tr>
                        </thead>
                        <tbody id="modal-leaderboard-list">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/charts.js?v=1.0.1"></script>
    <script src="js/app.js?v=1.0.12"></script>
</body>
</html>
