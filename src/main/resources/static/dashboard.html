<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Fitness Group Tracker</title>
    <link rel="stylesheet" href="css/style.css?v=1.0.10">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/navbar.js"></script>
    <script src="/js/csrf.js"></script>
</head>
<body>

    <!-- Top Navigation -->
    <header class="top-nav"></header>

    <div class="app-container">
        <main class="dashboard-main" id="dashboard-main">
            <!-- Dashboard Header & Filters -->
            <div class="dashboard-header">
                <div class="title-area">
                    <span class="live-label">LIVE LEADERBOARD</span>
                    <h1 class="page-title">DASHBOARD</h1>
                </div>
                <div class="time-filters">
                    <button class="filter-btn">TODAY</button>
                    <button class="filter-btn">THIS WEEK</button>
                    <button class="filter-btn">THIS MONTH</button>
                    <button class="filter-btn">THIS YEAR</button>
                    <button class="filter-btn active">ALL TIME</button>
                </div>
            </div>



                <!-- Right Column: Activity Feed -->
                <section class="feed-section" id="feed-section">
                    <div class="section-header" id="challenges-section">
                        <div>
                            <h3>Activity Feed</h3>
                            <span class="section-subtitle">LIVE UPDATES</span>
                        </div>
                    </div>
                    <div class="feed-filters-bar">
                        <select id="dashboard-feed-type" class="feed-select" title="Activity Type">
                            <option value="all">All Activities</option>
                            <option value="run">Run</option>
                            <option value="walk">Walk</option>
                            <option value="hike">Hike</option>
                            <option value="ride">Ride</option>
                            <option value="swim">Swim</option>
                            <option value="workout">Workout</option>
                            <option value="row">Row</option>
                            <option value="virtual run">Virtual Run</option>
                            <option value="virtual ride">Virtual Ride</option>
                            <option value="other">Other</option>
                        </select>
                        <select id="dashboard-feed-sort" class="feed-select" title="Sort By">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="longest-dist">Longest Distance</option>
                            <option value="shortest-dist">Shortest Distance</option>
                            <option value="longest-dur">Longest Duration</option>
                            <option value="shortest-dur">Shortest Duration</option>
                        </select>
                    </div>
                    <div id="dashboard-active-filters" class="active-filters-display hidden"></div>
                    <div id="global-feed-list" class="global-feed-list">
                        <div class="loading-text">Loading feed...</div>
                    </div>
                </section>
            </div>
        </main>
        
    </div>
    
    <script src="js/charts.js?v=1.0.1"></script>
    <script src="js/app.js?v=1.0.9"></script>
</body>
</html>
